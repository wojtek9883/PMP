name: Fix PMP Answers

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Pobierz repo
        uses: actions/checkout@v4

      - name: Uruchom skrypt
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 fix_pmp_answers.py PMP_Baza_Pytan_1800.html

      - name: Zapisz zmiany
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PMP_Baza_Pytan_1800.html
          git diff --staged --quiet || git commit -m "Fix: uzupelniono brakujace odpowiedzi przez Claude AI"
          git push
